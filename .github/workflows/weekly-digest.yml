name: Weekly AI Digest

on:
  schedule:
    # Every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_digest.py

      - name: Commit and push digest
        run: |
          git config user.name "ai-digest-bot"
          git config user.email "ai-digest-bot@users.noreply.github.com"
          git add digests/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "digest: $(date -u +%Y-%m-%d) weekly AI roundup"
          git push
